<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>달리기 애니메이션 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f5;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      user-select: none;
    }

    .wobbly-filter { position: absolute; width: 0; height: 0; }

    /* ── 강아지 컨테이너 ── */
    .runner {
      position: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 1.2s ease-out;
    }

    /* ── Heavy 말풍선 ── */
    .bubble {
      position: relative;
      background: #fff;
      padding: 12px 20px;
      font-size: 14px;
      color: #111;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1.5;
      max-width: 220px;
      white-space: nowrap;
      border: 3.5px solid #111;
      border-radius: 38% 48% 42% 52% / 52% 38% 48% 42%;
      filter: url(#w1);
      box-shadow: 5px 5px 0px #111;
      transform: rotate(-1.5deg);
      margin-bottom: 46px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .bubble.show { opacity: 1; }

    .bubble .d1, .bubble .d2 {
      position: absolute;
      background: #fff;
      border: 3.5px solid #111;
      filter: url(#w1);
      box-shadow: 3px 3px 0px #111;
    }
    .bubble .d1 {
      width: 17px; height: 14px;
      bottom: -26px; left: 36%;
      border-radius: 55% 45% 50% 50%;
    }
    .bubble .d2 {
      width: 11px; height: 10px;
      bottom: -44px; left: 41%;
      border-radius: 50%;
    }

    .pet-wrap { position: relative; }

    .pet {
      width: 120px;
      height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .floor-shadow {
      width: 70px;
      height: 12px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.12) 0%, transparent 70%);
      border-radius: 50%;
      margin-top: -4px;
    }

    .caught .pet {
      animation: caughtShake 0.4s ease-in-out;
    }
    @keyframes caughtShake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-8deg); }
      40% { transform: rotate(8deg); }
      60% { transform: rotate(-4deg); }
      80% { transform: rotate(4deg); }
    }
  </style>
</head>
<body>

<svg class="wobbly-filter">
  <defs>
    <filter id="w1">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="2" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<script>
// ── 대사 ──
const dialogues = {
  running: [
    "Catch me if you can!",
    "Hey, what are you doing?",
    "I'm full of energy right now!",
    "Stop scrolling and look at me!",
    "Come here! Let's play!",
    "Pay attention to me.",
    "Turn off the screen and run with me!",
    "Why am I running? No reason. Just vibes.",
    "Can't sit still. That's just who I am!",
    "I wanna run, you're lazy, I win."
  ],
  bounce: [
    "Boing!",
    "Wheee~!",
    "Can't stop me!",
    "Wall? No problem!",
    "Hehe, bouncy!",
    "Try and catch me!"
  ],
  caught: [
    "Oh no... you got me...",
    "Ugh, let me go...",
    "Fine... you win today...",
    "Next time I won't get caught!",
    "Didn't know you were that fast..."
  ]
};

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ── State ──
let runner = null;
let animFrame = null;
let caught = false;

const SPEED = 7;
// 강아지+말풍선 대략 크기 (벽 충돌 계산용)
const PET_W = 120;
const PET_H = 120;
// 말풍선+점꼬리가 강아지 위로 약 90px 차지
const BUBBLE_OFFSET = 90;

let x, y, vx, vy;
let bouncePhase = 0;
let dialogueTimer = 0;
const DIALOGUE_INTERVAL = 180;

function startRun() {
  if (runner) runner.remove();
  if (animFrame) cancelAnimationFrame(animFrame);
  caught = false;

  // DOM 생성
  runner = document.createElement('div');
  runner.className = 'runner';
  runner.innerHTML = `
    <div class="bubble" id="bubble">
      ${randomFrom(dialogues.running)}
      <div class="d1"></div>
      <div class="d2"></div>
    </div>
    <div class="pet-wrap">
      <img class="pet" id="pet" src="running_nobg.png" />
    </div>
    <div class="floor-shadow" id="shadow"></div>
  `;
  document.body.appendChild(runner);

  const pet = document.getElementById('pet');
  const bubble = document.getElementById('bubble');
  const shadow = document.getElementById('shadow');

  // 말풍선 헬퍼
  function setBubbleText(text) {
    bubble.textContent = text;
    const d1 = document.createElement('div'); d1.className = 'd1';
    const d2 = document.createElement('div'); d2.className = 'd2';
    bubble.appendChild(d1);
    bubble.appendChild(d2);
  }

  // ── 랜덤 시작 위치 & 각도 ──
  const sw = window.innerWidth;
  const sh = window.innerHeight;

  // 랜덤 각도 (대각선 방향으로)
  const angle = (Math.random() * 0.8 + 0.2) * (Math.random() < 0.5 ? 1 : -1);
  vx = Math.cos(angle) * SPEED;
  vy = Math.sin(angle) * SPEED;

  // 랜덤 시작 위치 (강아지가 화면 안에 오도록)
  x = Math.random() * (sw - PET_W - 100) + 50;
  y = Math.random() * (sh - PET_H - BUBBLE_OFFSET - 100) + 50;
  bouncePhase = 0;
  dialogueTimer = 0;

  // 초기 대사
  setTimeout(() => bubble.classList.add('show'), 200);
  setTimeout(() => bubble.classList.remove('show'), 2500);

  // ── 잡혔을 때 ──
  runner.addEventListener('click', () => {
    if (caught) return;
    caught = true;
    clearInterval(blinkTimer); // 깜박임 중지
    runner.style.transition = 'none';
    runner.style.opacity = '1'; // 혹시 깜박이는 중이면 복원

    // 1) 대사 변경 + 흔들림
    setBubbleText(randomFrom(dialogues.caught));
    bubble.classList.add('show');
    runner.classList.add('caught');

    // 2) 2초 보여주고
    setTimeout(() => {
      // 3) 대사+강아지 같이 서서히 사라짐
      runner.style.transition = 'opacity 1.2s ease-out';
      runner.style.opacity = '0';
      setTimeout(() => {
        runner.remove();
        // 리스타트
        setTimeout(() => startRun(), 1500);
      }, 1200);
    }, 2000);
  });

  // ── 벽 충돌 카운터 (대사용) ──
  let wallHitCount = 0;

  // ── 깜박임 (3초마다 잠깐 사라졌다 나타남) ──
  const BLINK_INTERVAL = 3000; // 3초마다
  const BLINK_DURATION = 300;  // 0.3초 동안 사라짐
  let blinkTimer = null;
  let isBlinking = false;

  function doBlink() {
    if (caught) return;
    isBlinking = true;
    runner.style.opacity = '0';
    runner.style.transition = 'opacity 0.12s';

    setTimeout(() => {
      if (caught) return;
      runner.style.opacity = '1';
      setTimeout(() => {
        isBlinking = false;
        runner.style.transition = 'opacity 1.2s ease-out'; // 원래 transition 복원
      }, 50);
    }, BLINK_DURATION);
  }

  blinkTimer = setInterval(doBlink, BLINK_INTERVAL);

  // ── 애니메이션 루프 ──
  function animate() {
    if (caught) return;

    dialogueTimer++;

    // ── 이동 ──
    x += vx;
    y += vy;

    // ── 벽 충돌 → 반사 (강아지 이미지 기준) ──
    // x, y는 컨테이너 좌상단. 강아지는 (x, y + BUBBLE_OFFSET) 에 위치
    const petX = x;
    const petY = y + BUBBLE_OFFSET;

    let hitWall = false;

    // 좌우 벽
    if (petX <= 0) {
      x = 0;
      vx = Math.abs(vx);
      hitWall = true;
    } else if (petX + PET_W >= sw) {
      x = sw - PET_W;
      vx = -Math.abs(vx);
      hitWall = true;
    }

    // 상하 벽 (강아지 기준, 위로 말풍선 삐져나감 OK)
    if (petY <= 0) {
      y = -BUBBLE_OFFSET;
      vy = Math.abs(vy);
      hitWall = true;
    } else if (petY + PET_H >= sh) {
      y = sh - PET_H - BUBBLE_OFFSET;
      vy = -Math.abs(vy);
      hitWall = true;
    }

    // 벽에 부딪힐 때마다 가끔 대사
    if (hitWall) {
      wallHitCount++;
      if (wallHitCount % 3 === 0) {
        setBubbleText(randomFrom(dialogues.bounce));
        bubble.classList.add('show');
        setTimeout(() => bubble.classList.remove('show'), 1500);
      }
    }

    // ── 바운스 (통통 뛰는 느낌) ──
    const currentSpeed = Math.sqrt(vx * vx + vy * vy);
    bouncePhase += currentSpeed * 0.028;

    const t = bouncePhase % (Math.PI * 2);
    const jump = (1 - Math.cos(t)) * 0.5;

    const bounceY = -jump * 28;
    const scaleY = 1 - jump * 0.04;
    const shadowScale = 1 - jump * 0.35;

    // ── DOM 업데이트 ──
    runner.style.transform = `translate(${x}px, ${y + bounceY}px)`;
    pet.style.transform = `scaleY(${scaleY})`;
    shadow.style.transform = `scaleX(${shadowScale * 0.9 + 0.1})`;
    shadow.style.opacity = shadowScale * 0.8 + 0.2;

    // ── 주기적 대사 ──
    if (dialogueTimer > DIALOGUE_INTERVAL) {
      dialogueTimer = 0;
      setBubbleText(randomFrom(dialogues.running));
      bubble.classList.add('show');
      setTimeout(() => bubble.classList.remove('show'), 2500);
    }

    animFrame = requestAnimationFrame(animate);
  }

  animFrame = requestAnimationFrame(animate);
}

startRun();
</script>

</body>
</html>
